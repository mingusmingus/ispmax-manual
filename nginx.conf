# ─────────────────────────────────────────────────────────────
# ISPMAX · Manual de Usuario — Configuración Nginx
# Servir contenido estático con headers de caché, compresión y
# seguridad. Atiende solo HTTP — HTTPS lo maneja el reverse proxy.
# ─────────────────────────────────────────────────────────────

server {
    listen       8387;
    listen       [::]:8387;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Tamaños / timeouts razonables ────────────────────────
    client_max_body_size 1m;
    keepalive_timeout 65;
    server_tokens off;   # ocultar versión de Nginx en respuestas

    # ── Compresión gzip ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Headers de seguridad (defensa en profundidad) ────────
    # Nota: si tu proxy ya añade algunos, Nginx los duplicará.
    # Si pasa, comenta los que el proxy ya entrega.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP relajada para permitir Google Fonts (la única fuente externa)
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ── Caché ────────────────────────────────────────────────
    # Imágenes y fuentes: caché agresivo (un año)
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # CSS / JS: caché corto, validación rápida
    # (el manual no usa hash en el nombre, así que 1 hora es prudente)
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # HTML: no cachear nunca, así los cambios se ven al instante
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Rutas ────────────────────────────────────────────────
    # SPA-like fallback: si piden /algo que no existe, devuelve index.html
    # (el manual usa hashes para navegación interna)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acceso a archivos ocultos (.git, .env, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Página de error: redirigir 404 al manual también
    error_page 404 /index.html;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
